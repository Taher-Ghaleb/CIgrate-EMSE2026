language: java
jdk: openjdk11
branches:
  except:
    - gh-pages
env:
  global:
    - GITHUB_REF=${TRAVIS_GIT_BRANCH}
    - MAIN_BRANCH_NAME=main
    - SEMANTIC_RELEASE_VERSION=19.0.5
    - SEMANTIC_CHANGELOG_VERSION=6.0.1
    - SEMANTIC_GIT_VERSION=10.0.1
    - SEMANTIC_EXEC_VERSION=6.0.3
cache:
  directories:
    - $HOME/.m2
before_install:
  - export GPG_TTY=$(tty)
install:
  - echo -e "$GPG_PRIVATE_KEY" | base64 --decode | gpg --import
  - chmod +x mvnw
before_script:
  - ./mvnw -B -ntp verify 1>&2
script:
  - ./mvnw clean package
deploy:
  provider: script
  script: ./mvnw -s ./.travis.mvnw deploy -DskipTests=true
  skip_cleanup: true
  on:
    tags: true
env:
  global:
    - secure: "********************"
    - secure: "********************"
    - secure: "********************"
    - secure: "********************"
