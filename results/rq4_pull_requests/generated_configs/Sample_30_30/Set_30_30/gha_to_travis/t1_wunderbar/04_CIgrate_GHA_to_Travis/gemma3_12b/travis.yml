language: java

jdk:
  - openjdk17
  - openjdk21

install: true

script:
  - mvn --batch-mode --show-version --no-transfer-progress -DCI=GitHub install

branches:
  except:
    - /^v.*$/

env:
  global:
    - secure: "********************"

notifications:
  slack:
    secure: "********************"
model
name: Java CI

on:
  push:
  pull_request:
  schedule: [ cron: '42 0 * * 5' ] # weekly: At 00:42 on Friday

jobs:
  build:
    strategy:
      matrix:
        jdk: [ openjdk17, openjdk21 ]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.jdk }}
          cache: 'maven'
      
      - name: Build with Maven
        run: mvn --batch-mode --show-version --no-transfer-progress -DCI=GitHub install
