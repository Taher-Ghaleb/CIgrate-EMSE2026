name: CI

on:
  push:
    branches:
      - master
      - "2.*"
      - "3.*"
  pull_request:
    branches:
      - master
      - "2.*"
      - "3.*"

env:
  JDK_VERSION: 8
  MAVEN_OPTS: -Xmx2g -Dmaven.javadoc.skip=true -B -V
  LOGSTASH_VERSION: 7.17.10
  LOGSTASH_PLUGINS_VERSION: 8.0.0
  LOGSTASH_PLUGINS_SNAPSHOT: false
  LOGSTASH_PLUGINS_SNAPSHOT_VERSION: 8.0.0-SNAPSHOT
  LOGSTASH_PLUGINS_SNAPSHOT_VERSION_TEST: 8.0.0-SNAPSHOT
  LOGSTASH_PLUGINS_SNAPSHOT_VERSION_TEST_2: 8.0.0-SNAPSHOT
  LOGSTASH_PLUGINS_SNAPSHOT_VERSION_TEST_3: 8.0.0-SNAPSHOT
  LOGSTASH_PLUGINS_SNAPSHOT_VERSION_TEST_4: 8.0.0-SNAPSHOT
  LOGSTASH_PLUGINS_SNAPSHOT_VERSION_TEST_5: 8.0.0-SNAPSHOT
  LOGSTASH_PLUGINS_SNAPSHOT_VERSION_TEST_6: 8.0.0-SNAPSHOT
  LOGSTASH_PLUGINS_SNAPSHOT_VERSION_TEST_7: 8.0.0-SNAPSHOT
  LOGSTASH_PLUGINS_SNAPSHOT_VERSION_TEST_8: 8.0.0-SNAPSHOT
  LOGSTASH_PLUGINS_SNAPSHOT_VERSION_TEST_9: 8.0.0-SNAPSHOT
  LOGSTASH_PLUGINS_SNAPSHOT_VERSION_TEST_10: 8.0.0-SNAPSHOT
  LOGSTASH_PLUGINS_SNAPSHOT_VERSION_TEST_11: 8.0.0-SNAPSHOT
  LOGSTASH_PLUGINS_SNAPSHOT_VERSION_TEST_12: 8.0.0-SNAPSHOT
  LOGSTASH_PLUGINS_SNAPSHOT_VERSION_TEST_13: 8.0.0-SNAPSHOT
  LOGSTASH