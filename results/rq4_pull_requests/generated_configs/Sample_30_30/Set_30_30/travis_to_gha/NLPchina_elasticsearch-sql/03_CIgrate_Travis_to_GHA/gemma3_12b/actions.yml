name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:9.1.4
        ports:
          - 9200:9200
        env:
          discovery.type: single-node
        options: >-
          --health-cmd "curl -s --retry 3 --retry-delay 5s http://localhost:9200/_health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-
      
      - name: Install dependencies
        run: mvn install -DskipTests=true -Dmaven.javadoc.skip=true -Dgpg.skip=true
      
      - name: Run tests
        run: |
          ulimit -a
          mvn testmodel