name: Android CI

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Install Android SDK components
        run: |
          yes | sdkmanager "platforms;android-34"
          yes | sdkmanager "platforms;android-28"
          yes | sdkmanager "platforms;android-27"
          yes | sdkmanager "platforms;android-26"
          yes | sdkmanager "platforms;android-21"
          yes | sdkmanager "build-tools;34.0.0"
          yes | sdkmanager "build-tools;28.0.3"
          yes | sdkmanager "build-tools;27.0.3"
          yes | sdkmanager "build-tools;26.0.2"
          yes | sdkmanager "extra-android-m2repository"
          yes | sdkmanager "add-on"
          yes | sdkmanager "extra"
          yes | sdkmanager "sys-img-armeabi-v7a-android-21"
      
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses
      
      - name: Make gradlew executable
        run: chmod +x gradlew
      
      - name: Build and test
        run: ./gradlew clean assemble test assembleAndroidTest
      
