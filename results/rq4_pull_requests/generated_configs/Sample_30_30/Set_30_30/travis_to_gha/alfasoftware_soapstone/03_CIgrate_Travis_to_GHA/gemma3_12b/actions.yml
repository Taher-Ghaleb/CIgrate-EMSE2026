name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    if: github.repository == 'alfasoftware/soapstone' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
      - name: Build and test
        run: mvn clean test -B -U -Pdefault
      - name: Cleanup JDK
        run: |
          sudo rm -f /usr/share/java/temurin-11*.jar
          sudo rm -rf /usr/share/man/man1/java*
  deploy:
    if: github.repository == 'alfasoftware/soapstone' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')) && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
      - name: Import GPG keys
        run: |
          echo $GPG_SECRET_KEYS | base64 --decode | gpg --batch --import
          echo $GPG_OWNERTRUST | base64 --decode | gpg --batch --import-ownertrust
        env:
          GPG_SECRET_KEYS: ${{ secrets.GPG_SECRET_KEYS }}
          GPG_OWNERTRUST: ${{ secrets.GPG_OWNERTRUST }}
      - name: Deploy
        run: mvn clean deploy --settings .maven-settings.xml -B -U -Prelease
