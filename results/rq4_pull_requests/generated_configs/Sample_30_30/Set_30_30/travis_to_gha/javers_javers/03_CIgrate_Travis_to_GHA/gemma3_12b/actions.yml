name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  tags: [master-*]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgresql:
        image: postgres:15
        ports:
          - 65432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD:
          POSTGRES_DB: travis_ci_test
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      mysql:
        image: mysql:8
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD:
          MYSQL_DATABASE: travis_ci_test
        options: >-
          --health-cmd "mysqladmin ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Make gradlew executable
        run: chmod +x gradlew
      
      - name: Before script
        run: |
          psql -c 'create database travis_ci_test;' -U postgres
          psql -c 'create schema j_some authorization postgres;' -U postgres travis_ci_test
          psql -c "CREATE ROLE javers LOGIN PASSWORD 'javers' SUPERUSER;" -U postgres
          psql -c 'SHOW server_version