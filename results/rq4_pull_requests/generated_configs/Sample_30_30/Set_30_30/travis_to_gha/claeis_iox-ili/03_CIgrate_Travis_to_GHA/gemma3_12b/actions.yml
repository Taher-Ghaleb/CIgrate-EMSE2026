name: Java CI

on:
  push:
    branches: [master, stable]
  pull_request:
    branches: [master, stable]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: 'gradle'
      
      - name: Make gradlew executable
        run: chmod +x gradlew
      
      - name: Build with Gradle
        run: ./gradlew build
      
      - name: After failure
        if: failure()
        run: cat build/junitreport/TEST-*.txt
      
      - name: Deploy to master
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          repos_pwd: ${{ secrets.REPOS_PWD }}
        run: ./gradlew -Drepos_pwd=${{ env.repos_pwd }} -Drepos_usr=jql_jars-INTE upload
      
      - name: Deploy to stable
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/stable'
        env:
          repos_pwd: ${{ secrets.REPOS_PWD }}
        run: ./gradlew -Drepos_pwd=${{ env.repos_pwd }} -Drepos_usr=jql_jars-INTE '-Drelease=' upload
model