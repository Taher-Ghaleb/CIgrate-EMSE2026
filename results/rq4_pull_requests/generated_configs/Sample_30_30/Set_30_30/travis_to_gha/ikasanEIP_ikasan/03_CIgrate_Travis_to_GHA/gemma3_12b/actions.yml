name: Java CI

on:
  push:
    branches:
      - 3.3.x
      - 4.0.x
      - 4.1.x
  pull_request:
    branches:
      - 3.3.x
      - 4.0.x
      - 4.1.x
  tags:
    types: [release]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'maven'
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.m2/wrapper
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-
      - name: Install Maven
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          curl https://archive.apache.org/dist/maven/maven-3/3.8.6/binaries/apache-maven-3.8.6-bin.tar.gz | tar zxf - -C $HOME
          echo "export M2_HOME=$HOME/apache-maven-3.8.6" >> $HOME/.bashrc
          echo "export PATH=$M2_HOME/bin:$PATH" >> $HOME/.bashrc
          source $HOME/.bashrc
      - name: Build
        run: mvn --file ikasaneip/pom.xml --settings .settings.xml clean install -Dmaven.javadoc.skip=true -Djava.security.egd=file:/dev/./urandom -Pall -B -V

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: