name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo
        ports:
          - :27017
        options: >-
          --health-cmd="mongos --eval 'db.runCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
      - name: Install MongoDB
        run: |
          sudo apt-get update
          sudo apt-get install -y mongodb-org
      - name: Make script executable
        run: chmod +x travis.sh
      - name: Run script
        run: ./travis.sh