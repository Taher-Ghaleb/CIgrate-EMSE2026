name: Java CI

on:
  push:
    branches:
      - master
      - stable
  pull_request:
    branches:
      - master
      - stable

env:
  PGPORT: 5433
  PGUSER: postgres

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ili2db
          MYSQL_USER: root
          MYSQL_PASSWORD: root
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=3
      postgresql:
        image: postgres:12
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ili2db
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=3
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-CU9-ubuntu-20.04
        ports:
          - 1433:1433
        env:
          ACCEPT_EULA: Y
          MSSQL_PID: Developer
          MSSQL_SA_PASSWORD: MsInst2019x
        options: >-
          --health-cmd="test -f $VAULT/data/master.mdf"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
      
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Make gradlew executable
        run: chmod +x gradlew
      
      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install docutils Pygments rst2html
      
      - name: Run tests
        run: ./gradlew test ili2mysqlTest ili2pgTest ili2fgdbTest ili2mssqlTest ili2oraTest
      
      - name: Build and publish artifacts
        if: success()
        run: ./gradlew ili2mysqlBindist ili2pgBindist ili2fgdbBindist ili2mssqlBindist ili2oraBindist
      
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: build/junitreport/junit-noframes.html
          retention-days: 7
      
      - name: Cleanup
        if: always()
        run: |
          docker stop mssql-test || true